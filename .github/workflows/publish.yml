# Near-identical to the other @casomoltd package repos' publish.yml
# (OIDC trusted publish to npm). Kept per-repo on purpose: npm trusted
# publishing matches a specific repo + workflow file, so a per-repo file
# is the simplest reliable setup. A reusable workflow in casomoltd/.github
# is a possible future consolidation (would require repointing each
# package's npm Trusted Publisher at it).
name: Publish to npm

on:
  # Release = a version tag pushed from a maintainer's machine
  # (npm version patch -> git push --follow-tags). PR merges to
  # main do NOT publish — only the tag push does — so external
  # contributions land via PR without triggering a release, and
  # the local check-version/check-tags hooks stay the gate.
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — trusted publishing, no stored token

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
