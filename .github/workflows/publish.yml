# Near-identical to the other @casomoltd package repos' publish.yml
# (OIDC trusted publish to npm). Kept per-repo on purpose: npm trusted
# publishing matches a specific repo + workflow file, so a per-repo file
# is the simplest reliable setup. A reusable workflow in casomoltd/.github
# is a possible future consolidation (would require repointing each
# package's npm Trusted Publisher at it).
name: Publish to npm

on:
  # Release = a version tag pushed from a maintainer's machine
  # (npm version patch -> git push --follow-tags). PR merges to
  # main do NOT publish — only the tag push does — so external
  # contributions land via PR without triggering a release, and
  # the local check-version/check-tags hooks stay the gate.
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — trusted publishing, no stored token

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Pinned to 11.9.0: npm 12.0.0 ships broken provenance wiring
      # ("Cannot find module 'sigstore'") that crashes `npm publish` when
      # publishConfig.provenance is set. 11.9.0 is the last known-good
      # (it published v0.6.0 with provenance + OIDC). Revert to @latest
      # once npm ships a 12.x that fixes sigstore. Trusted publishing
      # needs >= 11.5.1, which 11.9.0 satisfies.
      - name: Update npm (pin 11.9.0 — npm 12.0.0 provenance/sigstore bug)
        run: npm install -g npm@11.9.0

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
